<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | NOT FOUND</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Outfit', sans-serif; text-align: center; }
        .hero-title { font-size: 15vw; font-family: 'Bebas Neue', var(--font-fallback, sans-serif); color: #D71920; margin-bottom: 20px; line-height: 0.8;}
        p { font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 50px; color: #aaa; }
        a { padding: 16px 40px; border: 1px solid rgba(255,255,255,0.2); color: #fff; text-decoration: none; font-size: 11px; font-weight: 800; letter-spacing: 0.3em; text-transform: uppercase; border-radius: 50px; transition: 0.4s cubic-bezier(0.19,1,0.22,1); }
        a:hover { background: #D71920; border-color: #D71920; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(215,25,32,0.3); }
    </style>
</head>
<body>
    <div>
        <h1 class="hero-title">404</h1>
