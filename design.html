<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Design | SMK CAR Exhibition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --red: #D71920;
            --bg: #050505;
            --text-main: #f4f4f4;
            --text-dim: #999;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1s ease-out;
        }
        .loader-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; margin-top: 20px; }
        .loader-progress { position: absolute; inset: 0; background: var(--red); transform: translateX(-100%); }

        /* --- IMMERSIVE VIEWER --- */
        .viewer-container {
            position: fixed; inset: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
        }
        model-viewer {
            width: 100%; height: 100%;
            pointer-events: all;
            --poster-color: transparent;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        /* --- SCROLLABLE TRACK --- */
        .scroll-track { height: 400vh; position: relative; z-index: 10; pointer-events: none; }
        
        /* --- UI OVERLAY --- */
        .ui-overlay {
            position: fixed; inset: 0; z-index: 20; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 60px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; text-decoration: none; color: #fff; letter-spacing: 0.1em; }
        .logo span { color: var(--red); }
        .btn-back { 
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 24px; border-radius: 100px; font-family: inherit; font-size: 11px;
            font-weight: 800; cursor: pointer; backdrop-filter: blur(10px); pointer-events: all;
            text-decoration: none; transition: 0.3s;
        }
        .btn-back:hover { background: var(--red); border-color: var(--red); }

        .center-labels { text-align: center; margin-top: 40px; }
        .sec-label { font-size: 11px; letter-spacing: 0.4em; color: var(--red); font-weight: 800; text-transform: uppercase; margin-bottom: 20px; display: block; }
        .car-title { font-size: clamp(40px, 8vw, 100px); font-weight: 900; line-height: 1; text-transform: uppercase; }

        .footer-controls { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        .control-hint { color: var(--text-dim); font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; display: flex; align-items: center; gap: 15px; }
        .scroll-indicator { width: 1px; height: 60px; background: linear-gradient(to bottom, var(--red), transparent); }

        /* --- HUD ELEMENTS --- */
        .hud-grid {
            position: fixed; left: 60px; top: 50%; transform: translateY(-50%);
            z-index: 20; display: flex; flex-direction: column; gap: 40px; pointer-events: none;
        }
        .hud-item { border-left: 2px solid rgba(215,25,32,0.3); padding-left: 20px; transition: 0.5s; }
        .hud-item.active { border-color: var(--red); }
        .hud-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 5px; }
        .hud-val { font-size: 18px; font-weight: 800; color: #fff; }

        @media (max-width: 768px) {
            .ui-overlay { padding: 30px; }
            .hud-grid { display: none; }
        }
    </style>
</head>
<body>

    <div id="preloader">
        <h2 style="font-weight: 900; letter-spacing: 0.1em;">INITIALIZING 3D ENGINE</h2>
        <div class="loader-bar"><div class="loader-progress" id="loadBar"></div></div>
    </div>

    <!-- 3D VIEWER -->
    <div class="viewer-container">
        <model-viewer id="viewer"
            src=""
            field-of-view="45deg"
            min-field-of-view="10deg"
            max-field-of-view="45deg"
            interpolation-decay="200"
            interaction-prompt="none"
            camera-controls
            disable-zoom
            auto-rotate
            environment-image="neutral"
            exposure="1.8"
            shadow-intensity="1">
        </model-viewer>
    </div>

    <!-- UI LAYER -->
    <div class="ui-overlay">
        <div class="header">
            <a href="/" class="logo"><img src="logo.png" class="brand-logo" alt="Logo">SMK <span>C</span>AR</a>
            <a href="#" id="backBtn" class="btn-back">EXIT SHOWCASE</a>
        </div>

        <div class="center-labels">
            <span class="sec-label" id="brand-tag">Exhibition</span>
            <h1 class="car-title" id="car-name">MODEL SHOWCASE</h1>
        </div>

        <div class="footer-controls">
            <div class="control-hint">
                <span>DRAG TO ROTATE</span>
                <div class="scroll-indicator"></div>
                <span>SCROLL TO ZOOM</span>
            </div>
            <div style="text-align: right;">
                <span class="sec-label" style="margin-bottom: 5px;">ARCHITECTURE</span>
                <p style="font-size: 16px; font-weight: 800; font-style: italic;">PERFORMANCE EVOLVED</p>
            </div>
        </div>
    </div>

    <div class="hud-grid">
        <div class="hud-item" id="hud1">
            <span class="hud-label">Aerodynamics</span>
            <span class="hud-val">ACTIVE ACTIVE</span>
        </div>
        <div class="hud-item" id="hud2">
            <span class="hud-label">Materiality</span>
            <span class="hud-val">FORGED CARBON</span>
        </div>
    </div>

    <!-- SCROLLABLE SURFACE -->
    <div class="scroll-track"></div>

    <script src="carsData.js"></script>
    <script>
        gsap.registerPlugin(ScrollTrigger);

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const carId = urlParams.get('id') || 'bolide';
            const car = db.getCars().find(c => c.id === carId);
            const viewer = document.getElementById('viewer');

            if (car) {
                document.title = `${car.name} | Design Exploration`;
                document.getElementById('car-name').innerText = car.name;
                document.getElementById('brand-tag').innerText = `${car.brand.toUpperCase()} AUTOMOTIVE`;
                viewer.src = car.modelUrl;
                document.getElementById('backBtn').href = car.brand === 'mclaren' ? 'mclaren.html' : `/car?id=${car.id}`;
            }

            // --- LOADING LOGIC ---
            viewer.addEventListener('progress', (e) => {
                const prog = e.detail.totalProgress * 100;
                document.getElementById('loadBar').style.transform = `translateX(${-100 + prog}%)`;
                if (prog === 100) {
                    setTimeout(() => {
                        document.getElementById('preloader').style.transform = 'translateY(-100%)';
                    }, 500);
                }
            });

            // --- ZOOM ON SCROLL ENGINE ---
            // We map scroll from 0 to 1 -> FOV from 45deg to 10deg (Zoom In)
            gsap.to({}, {
                scrollTrigger: {
                    trigger: ".scroll-track",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1,
                    onUpdate: (self) => {
                        const progress = self.progress;
                        // FOM 45 (out) to 10 (in)
                        const fov = 45 - (progress * 35);
                        viewer.fieldOfView = `${fov}deg`;
                        
                        // Active rotation speed reduction on zoom
                        viewer.rotationPerSecond = `${30 * (1 - progress)}deg`;
                        
                        // HUD Updates
                        if (progress > 0.2) document.getElementById('hud1').classList.add('active');
                        else document.getElementById('hud1').classList.remove('active');
                        
                        if (progress > 0.6) document.getElementById('hud2').classList.add('active');
                        else document.getElementById('hud2').classList.remove('active');
                    }
                }
            });

            // Reveal animations
            gsap.from(".center-labels > *", { 
                y: 50, opacity: 0, stagger: 0.2, duration: 2, ease: "power4.out", delay: 1.5 
            });
        });
    </script>
</body>
</html>
